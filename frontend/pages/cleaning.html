<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data Cleaning вҖ” AgriSight</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="app">
  <nav class="bg-white shadow-sm border-b sticky top-0 z-50"><div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between"><a href="../index.html" class="text-lg font-bold text-blue-700 shrink-0">рҹҢҫ AgriSight</a><div class="hidden md:flex items-center gap-1"><a v-for="item in nav" :href="item.href" :class="item.active?'bg-blue-600 text-white':'text-gray-600 hover:bg-gray-100'" class="px-3 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap">{{ lang==='zh'?item.label_zh:item.label_en }}</a><button @click="switchLanguage" class="ml-2 px-2 py-1 text-xs border rounded hover:bg-gray-100">{{ lang==='zh'?'EN':'дёӯж–Ү' }}</button></div><div class="md:hidden flex items-center gap-2"><button @click="switchLanguage" class="px-2 py-1 text-xs border rounded">{{ lang==='zh'?'EN':'дёӯж–Ү' }}</button><button @click="menuOpen=!menuOpen" class="p-2 rounded-lg hover:bg-gray-100"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path v-if="!menuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/><path v-else stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div></div><div v-show="menuOpen" class="md:hidden border-t bg-white px-4 py-2 pb-4"><a v-for="item in nav" :href="item.href" @click="menuOpen=false" :class="item.active?'bg-blue-50 text-blue-700 font-medium':'text-gray-600'" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-50">{{ lang==='zh'?item.label_zh:item.label_en }}</a></div></nav>

  <main class="max-w-3xl mx-auto px-4 py-6">
    <h1 class="text-xl md:text-2xl font-bold mb-4">{{ t('title') }}</h1>
    <div class="bg-white rounded-xl shadow-sm p-4 md:p-6 border space-y-4 text-sm">
      <div v-for="(s,i) in steps" :key="i" class="border-b last:border-0 pb-4 last:pb-0">
        <h3 class="font-semibold text-base mb-1">{{ i+1 }}. {{ s.title }}</h3>
        <p class="text-gray-600">{{ s.detail }}</p>
        <div v-if="s.result" class="mt-1 text-xs text-gray-400 font-mono">{{ s.result }}</div>
      </div>
    </div>
  </main>
</div>
<script>
const { createApp, ref } = Vue;
createApp({
  setup() {
    const lang=ref(localStorage.getItem("agrisight_lang")||"zh"); const menuOpen=ref(false);
    const L={zh:{title:"ж•°жҚ®жё…жҙ—жөҒзЁӢ"},en:{title:"Data Cleaning Process"}};
    const t=k=>L[lang.value]?.[k]||k;
    const switchLanguage=()=>{lang.value=lang.value==='zh'?'en':'zh';localStorage.setItem("agrisight_lang",lang.value);location.reload();};
    const nav=[{href:"../index.html",label_zh:"жҰӮи§Ҳ",label_en:"Home",active:false},{href:"products.html",label_zh:"е•Ҷе“Ғ",label_en:"Products",active:false},{href:"prediction.html",label_zh:"йў„жөӢ",label_en:"Predict",active:false},{href:"sales-analysis.html",label_zh:"й”Җе”®",label_en:"Sales",active:false},{href:"influence-factors.html",label_zh:"еӣ зҙ ",label_en:"Factors",active:false},{href:"clustering.html",label_zh:"иҒҡзұ»",label_en:"Clusters",active:false},{href:"pca.html",label_zh:"з«һдәүеҠӣ",label_en:"PCA",active:false},{href:"origin-map.html",label_zh:"дә§ең°",label_en:"Origins",active:false},{href:"promotion.html",label_zh:"дҝғй”Җ",label_en:"Promos",active:false},{href:"suggestions.html",label_zh:"е»әи®®",label_en:"Tips",active:false},{href:"cleaning.html",label_zh:"жё…жҙ—",label_en:"Clean",active:false},{href:"conclusions.html",label_zh:"з»“и®ә",label_en:"Conclusions",active:false}];

    const zh=lang.value==="zh";
    const steps=zh?[
      {title:"еҠ иҪҪеҺҹе§Ӣж•°жҚ®",detail:"д»Һ data/raw/raw_data.csv еҠ иҪҪ3,000жқЎеҶңдә§е“Ғи®°еҪ•пјҢеҢ…еҗ«15дёӘеӯ—ж®өгҖӮ",result:"3,000 rows Г— 15 columns"},
      {title:"зјәеӨұеҖјжЈҖжҹҘ",detail:"жЈҖжҹҘ product_nameгҖҒcategoryгҖҒprice дёүдёӘе…ій”®еӯ—ж®өгҖӮз”ҹжҲҗж•°жҚ®е®Ңж•ҙпјҢж— йңҖеҲ йҷӨиЎҢгҖӮ",result:"0 rows dropped"},
      {title:"ж•°еҖјеӯ—ж®өи§Јжһҗ",detail:"price еӯ—ж®өж”ҜжҢҒеӯ—з¬ҰдёІж јејҸпјҲ\"ВҘ12.80\"гҖҒ\"12.8~45.0\"пјүвҶ’ еҸ–жңҖдҪҺд»·иҪ¬дёәжө®зӮ№ж•°гҖӮsales_volume ж”ҜжҢҒ\"1дёҮ+\" вҶ’ 10000гҖҒ\"358д»¶\" вҶ’ 358гҖӮ",result:"100% parsed"},
      {title:"еҲҶзұ»жҳ е°„",detail:"ж·»еҠ  category_en еҲ—пјҡж°ҙжһңвҶ’FruitsпјҢи”¬иҸңвҶ’VegetablesпјҢзІ®жІ№вҶ’Grains & OilsпјҢиҢ¶еҸ¶вҶ’TeaпјҢз”ҹйІңвҶ’Fresh ProduceгҖӮ",result:"5 categories mapped"},
      {title:"зјәеӨұеҖјеЎ«е……",detail:"review_count зјәеӨұеЎ«0пјҢorigin зјәеӨұеЎ«\"жңӘзҹҘ\"пјҢrating жҢүзұ»еҲ«дёӯдҪҚж•°еЎ«е……гҖӮ",result:"0 nulls remaining"},
      {title:"еҺ»йҮҚ",detail:"жҢү product_name + category з»„еҗҲеҺ»йҮҚпјҢз§»йҷӨ79жқЎйҮҚеӨҚи®°еҪ•гҖӮ",result:"79 duplicates removed (2.6%)"},
      {title:"ејӮеёёеҖјеӨ„зҗҶ",detail:"price е’Ң sales_volume жҢү99еҲҶдҪҚж•°жҲӘе°ҫпјҡprice дёҠз•ҢВҘ285пјҲ30жқЎжҲӘж–ӯпјүпјҢsales_volume дёҠз•Ң5,173пјҲ30жқЎжҲӘж–ӯпјүгҖӮ",result:"60 values clipped"},
      {title:"иЎҚз”ҹеӯ—ж®ө",detail:"ж·»еҠ  price_tierпјҲbudget <ВҘ20 / mid ВҘ20вҖ“80 / premium >ВҘ80пјүе’Ң review_densityпјҲreviews/sales еҸӮдёҺеәҰжҢҮж ҮпјүгҖӮ",result:"2 derived columns"},
      {title:"дҝқеӯҳдёҺеҜје…Ҙ",detail:"жё…жҙ—еҗҺж•°жҚ®дҝқеӯҳиҮі data/cleaned/cleaned_data.csvпјҢеҗҢж—¶еҜје…Ҙ SQLite products иЎЁгҖӮ",result:"2,921 records saved"},
    ]:[
      {title:"Load Raw Data",detail:"Loaded 3,000 agricultural product records from data/raw/raw_data.csv with 15 fields.",result:"3,000 rows Г— 15 columns"},
      {title:"Missing Value Check",detail:"Checked product_name, category, price вҖ” all complete. No rows dropped.",result:"0 rows dropped"},
      {title:"Parse Numeric Fields",detail:"price supports string formats (\"ВҘ12.80\", \"12.8~45.0\") вҶ’ min price as float. sales_volume supports \"1дёҮ+\"вҶ’10000, \"358д»¶\"вҶ’358.",result:"100% parsed"},
      {title:"Category Mapping",detail:"Added category_en: ж°ҙжһңвҶ’Fruits, и”¬иҸңвҶ’Vegetables, зІ®жІ№вҶ’Grains & Oils, иҢ¶еҸ¶вҶ’Tea, з”ҹйІңвҶ’Fresh Produce.",result:"5 categories mapped"},
      {title:"Fill Missing Values",detail:"review_countвҶ’0, originвҶ’\"жңӘзҹҘ\", ratingвҶ’category median.",result:"0 nulls remaining"},
      {title:"Deduplication",detail:"Removed 79 exact duplicates by product_name + category.",result:"79 duplicates removed (2.6%)"},
      {title:"Outlier Capping",detail:"price and sales_volume capped at 99th percentile: price вүӨВҘ285 (30 clipped), sales вүӨ5,173 (30 clipped).",result:"60 values clipped"},
      {title:"Derived Columns",detail:"Added price_tier (budget/mid/premium) and review_density (reviews/sales).",result:"2 derived columns"},
      {title:"Save & Import",detail:"Saved to data/cleaned/cleaned_data.csv and imported into SQLite products table.",result:"2,921 records saved"},
    ];
    return {lang,menuOpen,t,switchLanguage,nav,steps};
  }
}).mount("#app");
</script>
</body>
</html>
