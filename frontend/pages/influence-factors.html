<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Factors — AgriSight</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="app">
  <nav class="bg-white shadow-sm border-b sticky top-0 z-50"><div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between"><a href="../index.html" class="text-lg font-bold text-blue-700 shrink-0">🌾 AgriSight</a><div class="hidden md:flex items-center gap-1"><a v-for="item in nav" :href="item.href" :class="item.active?'bg-blue-600 text-white':'text-gray-600 hover:bg-gray-100'" class="px-3 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap">{{ lang==='zh'?item.label_zh:item.label_en }}</a><button @click="switchLanguage" class="ml-2 px-2 py-1 text-xs border rounded hover:bg-gray-100">🌐</button></div><div class="md:hidden flex items-center gap-2"><button @click="switchLanguage" class="px-2 py-1 text-xs border rounded">🌐</button><button @click="menuOpen=!menuOpen" class="p-2 rounded-lg hover:bg-gray-100"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path v-if="!menuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/><path v-else stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div></div><div v-show="menuOpen" class="md:hidden border-t bg-white px-4 py-2 pb-4"><a v-for="item in nav" :href="item.href" @click="menuOpen=false" :class="item.active?'bg-blue-50 text-blue-700 font-medium':'text-gray-600'" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-50">{{ lang==='zh'?item.label_zh:item.label_en }}</a></div></nav>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <h1 class="text-xl md:text-2xl font-bold mb-4">{{ t('title') }}</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
      <div class="bg-white rounded-xl shadow-sm p-4 border"><div ref="c1" style="height:350px;"></div></div>
      <div class="bg-white rounded-xl shadow-sm p-4 border"><div ref="c2" style="height:350px;"></div></div>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3 text-center">
      <div v-for="m in metrics" :key="m.label" class="bg-white rounded-xl shadow-sm p-4 border"><div class="text-xl md:text-2xl font-bold" :class="m.color">{{ m.value }}</div><div class="text-xs text-gray-500">{{ m.label }}</div></div>
    </div>
    <p class="text-xs text-gray-400 mt-4 text-center">{{ t('note') }}</p>
  </main>
</div>
<script>
const { createApp, ref, reactive, onMounted } = Vue;
createApp({
  setup() {
    const lang=ref(localStorage.getItem("agrisight_lang")||"zh"); const menuOpen=ref(false);
    const L={zh:{title:"销量影响因素分析",note:"模型：随机森林 (100棵树)。预测因子：价格、评分、评价数、促销状态、类目。R²=0.71 表示模型解释了71%的销售差异。"},en:{title:"Sales Influence Factor Analysis",note:"Model: Random Forest (100 trees). Predictors: price, rating, review_count, promotion, category. R²=0.71 means 71% of sales variance explained."}};
    const t=k=>L[lang.value]?.[k]||k;
    const switchLanguage=()=>{lang.value=lang.value==='zh'?'en':'zh';localStorage.setItem("agrisight_lang",lang.value);location.reload();};
    const nav=[{href:"../index.html",label_zh:"概览",label_en:"Home",active:false},{href:"products.html",label_zh:"商品",label_en:"Products",active:false},{href:"prediction.html",label_zh:"预测",label_en:"Predict",active:false},{href:"sales-analysis.html",label_zh:"销售",label_en:"Sales",active:false},{href:"influence-factors.html",label_zh:"因素",label_en:"Factors",active:true},{href:"clustering.html",label_zh:"聚类",label_en:"Clusters",active:false},{href:"pca.html",label_zh:"竞争力",label_en:"PCA",active:false},{href:"origin-map.html",label_zh:"产地",label_en:"Origins",active:false},{href:"promotion.html",label_zh:"促销",label_en:"Promos",active:false},{href:"suggestions.html",label_zh:"建议",label_en:"Tips",active:false}];

    const c1=ref(null),c2=ref(null);
    const metrics=reactive([]);
    onMounted(async()=>{
      const r1=await fetch("http://localhost:8000/api/analysis/regression"); const d1=await r1.json();
      metrics.push({label:"RF R²",value:d1.rf_r2,color:"text-blue-600"},{label:"OLS R²",value:d1.ols_r2,color:"text-green-600"},{label:"MAE",value:d1.rf_mae,color:"text-orange-600"},{label:"RMSE",value:d1.rf_rmse,color:"text-red-500"},{label:"RF Gain",value:"+"+(d1.rf_r2-d1.ols_r2).toFixed(2),color:"text-purple-600"});

      echarts.init(c1.value).setOption({
        title:{text:"Feature Importance (Random Forest)",left:"center",textStyle:{fontSize:14}},
        xAxis:{type:"value",name:"Importance (%)"}, yAxis:{type:"category",data:Object.keys(d1.feature_importance).reverse()},
        series:[{type:"bar",data:Object.values(d1.feature_importance).reverse(),itemStyle:{color:"#3B82F6"},barMaxWidth:30,label:{show:true,position:"right",formatter:"{c}%",fontSize:11}}],
        grid:{left:90,right:50,top:35,bottom:20},
      });

      echarts.init(c2.value).setOption({
        title:{text:"What Drives Sales?",left:"center",textStyle:{fontSize:14}},
        tooltip:{trigger:"item",formatter:"{b}: {c}%"},
        series:[{type:"pie",radius:["45%","75%"],center:["50%","55%"],
          data:Object.entries(d1.feature_importance).map(([k,v])=>({name:k,value:v})),
          label:{fontSize:10},emphasis:{itemStyle:{shadowBlur:10}},
        }],
      });

      window.addEventListener("resize",()=>{[c1,c2].forEach(r=>{r.value&&echarts.getInstanceByDom(r.value)?.resize();});});
    });
    return {lang,menuOpen,t,switchLanguage,nav,c1,c2,metrics};
  }
}).mount("#app");
</script>
</body>
</html>
